# Render blueprint for the InterviewAI backend (free tier).
# Must live at the REPO ROOT for Render to detect it; rootDir points the build at backend/.
# Deploy: Render dashboard → New → Blueprint → pick this repo.
# Secret values (sync: false) are entered in the Render dashboard, not committed.
services:
  - type: web
    name: interviewai-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Node 22+ required: @supabase/supabase-js (realtime) needs a native
      # WebSocket global, which Node 20 lacks.
      - key: NODE_VERSION
        value: "22"
      # PORT is injected by Render automatically; the server binds to it.
      - key: CORS_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JUDGE0_URL
        value: https://ce.judge0.com
